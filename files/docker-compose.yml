version: "3.9"

services:
  lending-api:
    build: .
    container_name: lending-club-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=lending_club_model.keras
      - SCALER_PATH=scaler.pkl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
